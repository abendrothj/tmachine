# Alembic configuration for tmachine
# Run migrations: alembic upgrade head
# Generate a new revision: alembic revision --autogenerate -m "description"

[alembic]
script_location = alembic
prepend_sys_path = .

# DATABASE_URL is read from the environment (set in .env or exported).
# The env.py below pulls it at runtime; this placeholder is required by Alembic
# but is overridden by env.py.
sqlalchemy.url = postgresql+psycopg2://tmachine:tmachine@localhost:5432/tmachine

[post_write_hooks]

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
