name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tmachine
          POSTGRES_PASSWORD: tmachine
          POSTGRES_DB: tmachine
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tmachine"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://tmachine:tmachine@localhost:5432/tmachine
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install CPU-only PyTorch so gsplat doesn't pull a CUDA build.
      - name: Install CPU PyTorch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      # A database driver is required but not included in [db] (users choose their
      # own adapter).  psycopg2-binary provides a pre-compiled wheel for CI runners
      # so we don't need the PostgreSQL client headers.
      - name: Install psycopg2 binary for CI
        run: pip install psycopg2-binary

      # [dev]    → pytest, pytest-cov, httpx (TestClient transport)
      # [server] → fastapi, celery, sqlalchemy, alembic, etc.
      # AI extras excluded — no GPU, no diffusers, no Whisper on CI runners.
      - name: Install package
        run: pip install -e ".[dev,server]"

      - name: Apply migrations
        run: alembic upgrade head

      # -m "not gpu"  → skips tests tagged @pytest.mark.gpu
      - name: Test
        run: pytest -m "not gpu" --cov=tmachine --cov-report=term-missing
